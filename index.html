        {
          "@type": "Question",
          "name": "Mi az az Effectime?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Az Effectime egy vállalati workforce management platform, amely egységesíti a műszakbeosztást, kapacitástervezést, szabadságkezelést és jóváhagyási folyamatokat. Magyar kkv és enterprise szervezetek számára készült."

        {
          "@type": "Question",
          "name": "Hogyan működik a műszakbeosztás az Effectime-ban?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Az Effectime heti nézetű beosztási rácsot kínál irodák és csapatok szerint. A menedzserek egy kattintással rendelhetnek be munkatársakat, jelölhetik a hiányzásokat és láthatják a napi kapacitást valós időben."
          }
        },
        {
          "@type": "Question",
          "name": "Milyen integrációkat támogat az Effectime?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Az Effectime integrálódik a Microsoft 365 (Outlook naptár) rendszerrel, és CRM beágyazási SDK-t kínál, amellyel bármely CRM rendszerbe iframe-ként beágyazható a workforce adat."
          }
        },
        {
          "@type": "Question",
          "name": "Mennyibe kerül az Effectime?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Az Effectime ingyenesen kipróbálható – a regisztráció pár percet vesz igénybe, kártyaadatok nélkül. Fizetős enterprise csomag is elérhető nagyobb csapatok és magasabb szintű integrációs igények esetén."
          }
        },
        {
          "@type": "Question",
          "name": "GDPR-kompatibilis az Effectime?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Igen. Az Effectime EU-s adatközpontokat használ, az adatkezelés az Európai Unió GDPR-előírásainak megfelelően történik. Az adatfeldolgozási megállapodás (DPA) elérhető vállalati ügyfelek számára."
          }
        },
        {
          "@type": "Question",
          "name": "Lehet-e az Effectime-t beágyazni más CRM rendszerbe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Igen. Az Effectime CRM Embed SDK segítségével egyetlen iframe-kóddal beágyazható a műszakbeosztás, kapacitástervező, távollétnaptár és létszámkövetés bármely belső rendszerbe, token-alapú hitelesítéssel."
          }
        },
        {
          "@type": "Question",
          "name": "Hány fős csapatnál ajánlott az Effectime?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Az Effectime 5 főtől több száz fős csapatokig skálázódik. Leginkább 20–500 fős középvállalatok számára optimális, ahol a kézi Excel-alapú beosztás már nem hatékony."
          }
        },
        {
          "@type": "Question",
          "name": "Milyen nyelveken érhető el az Effectime?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Az Effectime magyarul, angolul, csehül, szlovákul, lengyelül, németül, osztrák némettel és románul is elérhető. A felület nyelve a felhasználói beállításoktól függően automatikusan váltódik."
          }
        }
